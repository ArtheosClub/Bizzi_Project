name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: bizzi
          POSTGRES_PASSWORD: bizzi
          POSTGRES_DB: bizzi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bizzi -d bizzi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://bizzi:bizzi@localhost:5432/bizzi_test

    steps:
      - uses: actions/checkout@v7.0.0

      # Verified current (git ls-remote --tags, 2026-07-17):
      # actions/checkout v7.0.0, astral-sh/setup-uv v8.3.2. uv/Python
      # versions below match docs/planning/TECH_STACK.md exactly.
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
          python-version: "3.13.14"

      - name: Install dependencies (fails if uv.lock is stale)
        run: uv sync --locked --all-groups

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Run migrations against a clean database
        run: uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest -v
